<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>舒尔特表格训练</title>
<style>
body{font-family:Arial;background:#f4f6f9;display:flex;justify-content:center}
.container{display:flex;margin-top:20px;gap:40px}
.left{text-align:center}
#controls{margin:20px}
select,button,label{padding:6px 10px;margin:5px;font-size:14px}
#timer{font-size:18px;margin:10px;font-weight:bold}
#grid{display:grid;justify-content:center;margin-top:20px;gap:5px}
.cell{background:white;border:2px solid #333;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;width:70px;height:70px}
.cell.correct{background:#4caf50;color:white}
.stats{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);min-width:240px}
.stats p{margin:6px 0}
</style>
</head>
<body>

<div class="container">

<div class="left">
<h1>舒尔特表格训练</h1>

<div id="controls">
<select id="difficulty">
<option value="3">3x3</option>
<option value="4" selected>4x4</option>
<option value="5">5x5</option>
<option value="6">6x6</option>
</select>
<label><input type="checkbox" id="noColorMode"> 无提示模式</label>
<button onclick="startGame()">开始</button>
<button onclick="startGame()">刷新</button>
</div>

<div id="timer">时间：0.00 秒</div>
<div id="grid"></div>
</div>

<div class="stats">
<h2>成绩统计</h2>
<p>游戏次数：<span id="gameCount">0</span></p>
<p>平均时间：<span id="avgTime">0.00</span> 秒</p>
<p>最好时间：<span id="bestTime">--</span></p>
<p>最差时间：<span id="worstTime">--</span></p>
<hr>
<p>当前轮次进度：<span id="roundProgress">0</span> / 5</p>
</div>

</div>

<script>
let size=4,current=1,startTime=null,timerInterval=null
let wrongCount=0

// 全局统计
let gameCount=0,totalTime=0,bestTime=null,worstTime=null

// 5局一轮
let roundTimes=[]

const grid=document.getElementById('grid')
const timerDisplay=document.getElementById('timer')
const difficultySelect=document.getElementById('difficulty')
const noColorMode=document.getElementById('noColorMode')

const gameCountEl=document.getElementById('gameCount')
const avgTimeEl=document.getElementById('avgTime')
const bestTimeEl=document.getElementById('bestTime')
const worstTimeEl=document.getElementById('worstTime')
const roundProgressEl=document.getElementById('roundProgress')

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function startGame(){
size=parseInt(difficultySelect.value)
current=1
wrongCount=0
startTime=null
clearInterval(timerInterval)
timerDisplay.textContent='时间：0.00 秒'

grid.innerHTML=''
grid.style.gridTemplateColumns=`repeat(${size},70px)`

let nums=[...Array(size*size)].map((_,i)=>i+1)
shuffle(nums)

nums.forEach(n=>{
let d=document.createElement('div')
d.className='cell'
d.textContent=n

d.onclick=()=>{
if(n===current){
if(current===1)startTimer()
if(!noColorMode.checked)d.classList.add('correct')
current++
if(current>size*size)finishGame()
}else{
if(noColorMode.checked && startTime!==null)wrongCount++
}
}

grid.appendChild(d)
})
}

function startTimer(){
startTime=Date.now()
timerInterval=setInterval(()=>{
let t=(Date.now()-startTime)/1000
timerDisplay.textContent='时间：'+t.toFixed(2)+' 秒'
},100)
}

function finishGame(){
clearInterval(timerInterval)
let finalTime=(Date.now()-startTime)/1000
updateStats(finalTime)
updateRound(finalTime)

if(noColorMode.checked){
setTimeout(()=>{
alert(`完成！\n用时：${finalTime.toFixed(2)} 秒\n错误次数：${wrongCount}`)
startGame()
},100)
}else{
alert('完成！用时：'+finalTime.toFixed(2)+' 秒')
}
}

function updateStats(time){
gameCount++
totalTime+=time
if(bestTime===null||time<bestTime)bestTime=time
if(worstTime===null||time>worstTime)worstTime=time

gameCountEl.textContent=gameCount
avgTimeEl.textContent=(totalTime/gameCount).toFixed(2)
bestTimeEl.textContent=bestTime.toFixed(2)
worstTimeEl.textContent=worstTime.toFixed(2)
}

function updateRound(time){
roundTimes.push(time)
roundProgressEl.textContent=roundTimes.length

if(roundTimes.length===5){
let sum=roundTimes.reduce((a,b)=>a+b,0)
let avg=sum/5
let best=Math.min(...roundTimes)
let worst=Math.max(...roundTimes)

setTimeout(()=>{
alert(`🎯 本轮5局完成！\n\n${roundTimes.map((t,i)=>`第${i+1}局：${t.toFixed(2)} 秒`).join('\n')}\n\n平均：${avg.toFixed(2)} 秒\n最好：${best.toFixed(2)} 秒\n最差：${worst.toFixed(2)} 秒\n\n⚠ 请休息1-2分钟。`)
},200)

roundTimes=[]
roundProgressEl.textContent=0
}
}

startGame()
</script>

</body>
</html>
